<script>
    const targetDate = new Date("May 20, 2026 00:00:00").getTime();
    let timerInterval;
    let errorCount = 0; // Track how many times the wrong pass was entered

    // --- NEW: Fun error messages for Ranju ---
    const funnyErrors = [
        "Nice try, but that's not it! 😂",
        "Are you sure you know your boyfriend's name? 🧐",
        "Wrong! Maybe try 'The Greatest Person Ever'? 😜",
        "Access Denied. Please deposit one kiss to try again. 💋",
        "Incorrect. Don't make me tell your mom! ☎️",
        "Error 404: Boyfriend not found with that name. ❌",
        "If you forget it again, I'm eating your birthday cake! 🎂😋",
        "Is it 'Benju'? 'Benji'? Try the real one! ❤️"
    ];

    function checkPassword() {
        const input = document.getElementById('passwordField').value.toLowerCase().trim();
        const errorDisplay = document.getElementById('error-msg');
        const now = new Date().getTime();
        
        if (input === 'benjamin') {
            if (now < targetDate) {
                // CORRECT PASS BUT TOO EARLY
                gsap.to("#login-content", { opacity: 0, y: -20, duration: 0.5, onComplete: () => {
                    document.getElementById('login-content').style.display = 'none';
                    const container = document.getElementById('countdown-container');
                    container.style.display = 'block';
                    gsap.fromTo(container, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5 });
                    startCountdown();
                }});
            } else {
                // BIRTHDAY ARRIVED!
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                nextPage(1);
            }
        } else {
            // --- UPDATED: WRONG PASS LOGIC ---
            // Shake the input field
            gsap.fromTo("#passwordField", { x: -10 }, { x: 10, repeat: 5, yoyo: true, duration: 0.05 });
            
            // Show a random/rotating funny message
            errorDisplay.innerText = funnyErrors[errorCount % funnyErrors.length];
            gsap.to(errorDisplay, { opacity: 1, duration: 0.3 });
            
            errorCount++; // Increment so the next error is different
        }
    }

    function startCountdown() {
        timerInterval = setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("mins").innerText = m.toString().padStart(2, '0');
            document.getElementById("secs").innerText = s.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(timerInterval);
                location.reload(); 
            }
        }, 1000);
    }

    function nextPage(num) {
        const current = document.querySelector('.page.active');
        const next = document.getElementById('p' + num);
        const isGoingBack = parseInt(next.id.replace('p','')) < parseInt(current.id.replace('p',''));
        
        gsap.to(current, { opacity: 0, scale: isGoingBack ? 1.1 : 0.9, duration: 0.5, onComplete: () => {
            current.classList.remove('active');
            next.classList.add('active');
            gsap.fromTo(next, { opacity: 0, scale: isGoingBack ? 0.9 : 1.1 }, { opacity: 1, scale: 1, duration: 0.6 });
            if(!isGoingBack && (num === 1 || num === 4)) confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
        }});
    }

    function flipCard(card) {
        if(card.classList.toggle('flipped')) {
            confetti({ particleCount: 30, spread: 50, origin: { y: 0.7 }, colors: ['#FAD0DD', '#B19CD9'] });
        }
    }

    // Particle Background
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let pArray = [];
    for (let i = 0; i < 70; i++) pArray.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, o: Math.random()*0.5 });
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        pArray.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
            ctx.fillStyle = `rgba(220, 208, 255, ${p.o})`; ctx.fill();
            p.y -= 0.2; if (p.y < -10) p.y = canvas.height + 10;
        });
        requestAnimationFrame(animate);
    }
    animate();

    function handleGlobalClick(e) {
        if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT' && !e.target.closest('.card')) {
            confetti({ particleCount: 8, startVelocity: 15, spread: 360, origin: { x: e.clientX/window.innerWidth, y: e.clientY/window.innerHeight }, colors: ['#FAD0DD', '#B19CD9'] });
        }
    }

    document.getElementById('passwordField').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPassword(); });
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
